metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "lmdb"
metadata_auto_snapshot_interval = "6h"

replication_factor = 1

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"
# rpc_secret set via GARAGE_RPC_SECRET env var

compression_level = 2

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
root_domain = "api.s3"

[s3_web]
bind_addr = "[::]:3902"
root_domain = "web.s3"
index = "index.html"

[admin]
api_bind_addr = "0.0.0.0:3903"
# metrics_token set via GARAGE_METRICS_TOKEN env var
# admin_token set via GARAGE_ADMIN_TOKEN env var
