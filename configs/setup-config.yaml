project_name: "deadlines"
containers:
  kafka: "kafka"
  redis: "redis"
  object_storage: "garage"
  db: "postgres"
kafka:
  admin_identity: "kafka-admin"
  topics:
    - name: "private.integration.notifications"
    - name: "private.integration.accountlinkage"
    - name: "private.auth.otp"
garage:
  admin_port: 3903
  layout:
    dev: "dev"
    prod: "prod"
  bucket: "deadlines-attachments"
  app_key_name: "deadlines-api"
pki:
  output_directory: "pki"
  backdate_minutes: 5
  renew_before_days: 30
  authorities:
    - name: "kafka-ca"
      issuer: null
      subject:
        common_name: "Deadlines Kafka Root CA"
        organization: "Deadlines"
        organizational_unit: null
        country: null
        state: null
        locality: null
      key_bits: 4096
      validity_days: 3650
      path_length: 0
    - name: "grpc-ca"
      issuer: null
      subject:
        common_name: "Deadlines gRPC Root CA"
        organization: "Deadlines"
        organizational_unit: null
        country: null
        state: null
        locality: null
      key_bits: 4096
      validity_days: 3650
      path_length: 0
  certificates:
    - name: "kafka-broker"
      issuer: "kafka-ca"
      subject:
        common_name: "kafka-broker"
        organization: "Deadlines"
        organizational_unit: null
        country: null
        state: null
        locality: null
      alternative_names:
        dns: ["kafka", "localhost"]
        ip: []
        uri: []
      extended_key_usages: ["server_auth", "client_auth"]
      key_bits: 2048
      validity_days: 365
      pkcs12: true
    - name: "kafka-admin"
      issuer: "kafka-ca"
      subject:
        common_name: "kafka-admin"
        organization: "Deadlines"
        organizational_unit: null
        country: null
        state: null
        locality: null
      alternative_names:
        dns: []
        ip: []
        uri: []
      extended_key_usages: ["client_auth"]
      key_bits: 2048
      validity_days: 365
      pkcs12: false
    - name: "api-kafka"
      issuer: "kafka-ca"
      subject:
        common_name: "api-kafka"
        organization: "Deadlines"
        organizational_unit: null
        country: null
        state: null
        locality: null
      alternative_names:
        dns: []
        ip: []
        uri: []
      extended_key_usages: ["client_auth"]
      key_bits: 2048
      validity_days: 365
      pkcs12: true
    - name: "telegram-kafka"
      issuer: "kafka-ca"
      subject:
        common_name: "telegram-kafka"
        organization: "Deadlines"
        organizational_unit: null
        country: null
        state: null
        locality: null
      alternative_names:
        dns: []
        ip: []
        uri: []
      extended_key_usages: ["client_auth"]
      key_bits: 2048
      validity_days: 365
      pkcs12: false
    - name: "api-grpc"
      issuer: "grpc-ca"
      subject:
        common_name: "api-grpc"
        organization: "Deadlines"
        organizational_unit: null
        country: null
        state: null
        locality: null
      alternative_names:
        dns: ["api"]
        ip: []
        uri: []
      extended_key_usages: ["server_auth"]
      key_bits: 2048
      validity_days: 365
      pkcs12: false
    - name: "telegram-grpc"
      issuer: "grpc-ca"
      subject:
        common_name: "telegram-grpc"
        organization: "Deadlines"
        organizational_unit: null
        country: null
        state: null
        locality: null
      alternative_names:
        dns: []
        ip: []
        uri: []
      extended_key_usages: ["client_auth"]
      key_bits: 2048
      validity_days: 365
      pkcs12: false
